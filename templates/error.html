{% extends "base.html" %}
{% block title %}{{ code }} Error — TodoApp{% endblock %}

{% block extra_css %}
<style>
  .error-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .error-box { max-width: 400px; }
  .error-code {
    font-size: 80px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1;
    margin-bottom: 12px;
  }
  .error-msg {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .error-sub {
    color: var(--text-m);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .btn-home {
    background: var(--primary);
    color: #fff;
    padding: 12px 28px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    display: inline-block;
  }
  .btn-home:hover {
    background: var(--primary-h);
    text-decoration: none;
  }
</style>
{% endblock %}

{% block body %}
<div class="error-wrap">
  <div class="error-box">
    <div class="error-code">{{ code }}</div>
    <div class="error-msg">{{ title }}</div>
    <div class="error-sub">{{ message }}</div>
    <a href="{{ url_for('index') }}" class="btn-home">
      <i class="fa fa-house"></i> Go Home
    </a>
  </div>
</div>
{% endblock %}
