<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}TodoApp{% endblock %}</title>

  <!-- Font Awesome icons -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Chart.js (used on dashboard) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    /* ── CSS Variables ── */
    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --surface2:  #f8f9fa;
      --primary:   #4f46e5;
      --primary-h: #4338ca;
      --text:      #1e1e2e;
      --text-m:    #6b7280;
      --border:    #e5e7eb;
      --danger:    #ef4444;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --radius:    12px;
      --shadow:    0 2px 12px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg:       #0f0f1a;
      --surface:  #1a1a2e;
      --surface2: #16213e;
      --text:     #e2e8f0;
      --text-m:   #94a3b8;
      --border:   #2d2d44;
      --shadow:   0 2px 12px rgba(0,0,0,0.4);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      min-height: 100vh;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    input, textarea, select {
      font-family: inherit;
      font-size: 14px;
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
    }
    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      transition: background .2s, transform .1s;
    }
    button:active { transform: scale(0.97); }

    /* ── Flash messages ── */
    .flashes { list-style: none; padding: 0; margin-bottom: 16px; }
    .flashes li {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .flashes .success { background: #dcfce7; color: #166534; }
    .flashes .danger  { background: #fee2e2; color: #991b1b; }
    .flashes .warning { background: #fef9c3; color: #854d0e; }
    .flashes .info    { background: #dbeafe; color: #1e40af; }
    [data-theme="dark"] .flashes .success { background: #14532d; color: #bbf7d0; }
    [data-theme="dark"] .flashes .danger  { background: #7f1d1d; color: #fecaca; }
    [data-theme="dark"] .flashes .warning { background: #78350f; color: #fde68a; }
    [data-theme="dark"] .flashes .info    { background: #1e3a5f; color: #bfdbfe; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); color: var(--text);
      padding: 14px 20px; border-radius: 10px;
      box-shadow: var(--shadow); font-size: 14px;
      border-left: 4px solid var(--primary);
      display: none; z-index: 9999;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Dark toggle button ── */
    #theme-toggle {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 16px;
    }
    #theme-toggle:hover { background: var(--surface2); }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

  {% block body %}{% endblock %}

  <!-- Toast notification -->
  <div id="toast"></div>

  <script>
    // ── Dark mode toggle ──────────────────────────────
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', saved);

    function toggleTheme() {
      const t = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.innerHTML = t === 'dark' ? '☀️' : '🌙';
    }

    // Set correct icon on load
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.innerHTML = saved === 'dark' ? '☀️' : '🌙';
    });

    // ── Toast helper ─────────────────────────────────
    function showToast(msg, color = '#4f46e5') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderLeftColor = color;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
